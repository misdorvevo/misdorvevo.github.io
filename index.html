<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indie Release Schedule Planner</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
</head>
<body>
    <header>
        <h1>Indie Release Schedule Planner</h1>
        <p>Plan your music release timeline backwards from your target release date.</p>
    </header>
    <main>
        <div id="template-section">
            <label for="template-select">Choose a Template:</label>
            <select id="template-select">
                <option value="General">General</option>
                <option value="Hip-Hop">Hip-Hop</option>
                <option value="Pop">Pop</option>
                <option value="EDM">EDM</option>
                <option value="Rock">Rock</option>
            </select>
            <label for="timeframe-select">Timeframe:</label>
            <select id="timeframe-select">
                <option value="0.7">Accelerated (70% time)</option>
                <option value="1" selected>Standard</option>
                <option value="1.3">Extended (130% time)</option>
            </select>
        </div>
        <form id="planner-form">
            <label for="release-date">Target Release Date:</label>
            <input type="date" id="release-date" required>
            <button type="submit">Generate Plan</button>
        </form>
        <div id="plan-output" style="display: none;">
            <h2>Your Release Plan</h2>
            <ul id="timeline"></ul>
            <div id='calendar'></div>
            <button id="export-btn">Export to Calendar</button>
            <div id="customize-section">
                <h3>Customize Milestones</h3>
                <ul id="milestone-list"></ul>
                <button id="add-milestone">Add Milestone</button>
            </div>
        </div>
    </main>
    <script>
        const templates = {
            'General': [
                { daysBefore: 0, task: "Release Day: Upload to distributors, go live!" },
                { daysBefore: 7, task: "Pre-save links go live, final quality checks" },
                { daysBefore: 14, task: "Marketing campaign launch, social media teasers" },
                { daysBefore: 30, task: "Mastering complete, artwork finalized" },
                { daysBefore: 60, task: "Mixing complete, video production finished" },
                { daysBefore: 90, task: "Recording complete, rough mixes done" },
                { daysBefore: 120, task: "Songwriting complete, demos ready" },
                { daysBefore: 180, task: "Planning and pre-production started" }
            ],
            'Hip-Hop': [
                { daysBefore: 0, task: "Release Day: Upload to distributors, go live!" },
                { daysBefore: 7, task: "Pre-save links go live, final quality checks" },
                { daysBefore: 14, task: "Marketing campaign launch, social media teasers" },
                { daysBefore: 30, task: "Mastering complete, artwork finalized" },
                { daysBefore: 90, task: "Mixing complete, video production finished" },
                { daysBefore: 120, task: "Recording complete, rough mixes done" },
                { daysBefore: 150, task: "Songwriting complete, beat production ready" },
                { daysBefore: 210, task: "Planning and pre-production started" }
            ],
            'Pop': [
                { daysBefore: 0, task: "Release Day: Upload to distributors, go live!" },
                { daysBefore: 7, task: "Pre-save links go live, final quality checks" },
                { daysBefore: 21, task: "Heavy marketing campaign launch, social media teasers" },
                { daysBefore: 30, task: "Mastering complete, artwork finalized" },
                { daysBefore: 60, task: "Mixing complete, video production finished" },
                { daysBefore: 90, task: "Recording complete, rough mixes done" },
                { daysBefore: 120, task: "Songwriting complete, demos ready" },
                { daysBefore: 180, task: "Planning and pre-production started" }
            ],
            'EDM': [
                { daysBefore: 0, task: "Release Day: Upload to distributors, go live!" },
                { daysBefore: 7, task: "Pre-save links go live, final quality checks" },
                { daysBefore: 14, task: "Marketing campaign launch, social media teasers" },
                { daysBefore: 30, task: "Mastering complete, artwork finalized" },
                { daysBefore: 45, task: "Mixing complete, video production finished" },
                { daysBefore: 60, task: "Recording complete, rough mixes done" },
                { daysBefore: 90, task: "Songwriting complete, production ready" },
                { daysBefore: 120, task: "Planning and pre-production started" }
            ],
            'Rock': [
                { daysBefore: 0, task: "Release Day: Upload to distributors, go live!" },
                { daysBefore: 7, task: "Pre-save links go live, final quality checks" },
                { daysBefore: 14, task: "Marketing campaign launch, social media teasers" },
                { daysBefore: 30, task: "Mastering complete, artwork finalized" },
                { daysBefore: 75, task: "Mixing complete, video production finished" },
                { daysBefore: 105, task: "Recording complete, rough mixes done" },
                { daysBefore: 135, task: "Songwriting complete, demos ready" },
                { daysBefore: 195, task: "Planning and pre-production started" }
            ]
        };

        let calendar;

        function renderCalendar(releaseDate, multiplier = 1) {
            const events = milestones.map(milestone => {
                const days = Math.round(milestone.daysBefore * multiplier);
                const eventDate = new Date(releaseDate);
                eventDate.setDate(releaseDate.getDate() - days);
                return {
                    title: milestone.task,
                    start: eventDate.toISOString().split('T')[0],
                    allDay: true
                };
            });

            if (calendar) {
                calendar.destroy();
            }

            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                initialDate: releaseDate.toISOString().split('T')[0],
                events: events,
                eventClick: function(info) {
                    // Find the milestone and edit
                    const milestone = milestones.find(m => m.task === info.event.title);
                    if (milestone) {
                        const index = milestones.indexOf(milestone);
                        editMilestone(index);
                    }
                },
                dateClick: function(info) {
                    // Set release date
                    document.getElementById('release-date').value = info.dateStr;
                },
                height: 'auto'
            });
            calendar.render();
        }

        function loadTemplate(template) {
            milestones = [...templates[template]];
            saveMilestones();
            renderMilestoneList();
        }

        function renderMilestoneList() {
            const listEl = document.getElementById('milestone-list');
            listEl.innerHTML = '';
            milestones.sort((a, b) => b.daysBefore - a.daysBefore).forEach((milestone, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${milestone.daysBefore} days before: ${milestone.task}</span>
                    <button onclick="editMilestone(${index})">Edit</button>
                    <button onclick="deleteMilestone(${index})">Delete</button>`;
                listEl.appendChild(li);
            });
        }

        function addMilestone() {
            const days = prompt('Days before release:');
            const task = prompt('Task description:');
            if (days && task) {
                milestones.push({ daysBefore: parseInt(days), task });
                saveMilestones();
                renderMilestoneList();
            }
        }

        function editMilestone(index) {
            const milestone = milestones[index];
            const days = prompt('Days before release:', milestone.daysBefore);
            const task = prompt('Task description:', milestone.task);
            if (days && task) {
                milestones[index] = { daysBefore: parseInt(days), task };
                saveMilestones();
                renderMilestoneList();
            }
        }

        function deleteMilestone(index) {
            if (confirm('Delete this milestone?')) {
                milestones.splice(index, 1);
                saveMilestones();
                renderMilestoneList();
            }
        }

        document.getElementById('template-select').addEventListener('change', function() {
            loadTemplate(this.value);
        });

        document.getElementById('planner-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const releaseDate = new Date(document.getElementById('release-date').value);
            const multiplier = parseFloat(document.getElementById('timeframe-select').value);
            const timelineEl = document.getElementById('timeline');
            timelineEl.innerHTML = '';
            milestones.forEach(milestone => {
                const days = Math.round(milestone.daysBefore * multiplier);
                const milestoneDate = new Date(releaseDate);
                milestoneDate.setDate(releaseDate.getDate() - days);
                const li = document.createElement('li');
                li.innerHTML = `<strong>${milestoneDate.toDateString()}</strong>: ${milestone.task}`;
                timelineEl.appendChild(li);
            });
            document.getElementById('plan-output').style.display = 'block';
            renderMilestoneList();
            renderCalendar(releaseDate, multiplier);
        });

        document.getElementById('export-btn').addEventListener('click', function() {
            const releaseDate = new Date(document.getElementById('release-date').value);
            const multiplier = parseFloat(document.getElementById('timeframe-select').value);
            let icsContent = `BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Indie Planner//EN\n`;
            milestones.forEach(milestone => {
                const days = Math.round(milestone.daysBefore * multiplier);
                const eventDate = new Date(releaseDate);
                eventDate.setDate(releaseDate.getDate() - days);
                const dateStr = eventDate.toISOString().slice(0,10).replace(/-/g,'');
                icsContent += `BEGIN:VEVENT\nSUMMARY:${milestone.task}\nDTSTART;VALUE=DATE:${dateStr}\nDTEND;VALUE=DATE:${dateStr}\nEND:VEVENT\n`;
            });
            icsContent += `END:VCALENDAR`;
            const blob = new Blob([icsContent], {type: 'text/calendar'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'release-plan.ics';
            a.click();
            URL.revokeObjectURL(url);
        });

        document.getElementById('add-milestone').addEventListener('click', addMilestone);

        // Initialize
        renderMilestoneList();
    </script>
</body>
</html>
